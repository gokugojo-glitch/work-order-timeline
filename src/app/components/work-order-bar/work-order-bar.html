<div
  class="work-order-bar"
  [ngStyle]="barStyle()"
  [title]="workOrder().data.name + ' (' + statusLabel() + ')'"
  (click)="onClick($event)"
>
  @if (showLabel()) {
    <span class="bar-label">
      {{ workOrder().data.name }}
    </span>
  }
  <div
    class="bar-status-dot"
    [ngStyle]="{ backgroundColor: statusColor() }"
  ></div>

  <!-- Three-dot menu button (appears on hover) -->
  <button
    class="menu-button"
    (click)="onMenuClick($event)"
    title="Actions"
  >
    ⋮
  </button>
</div>
